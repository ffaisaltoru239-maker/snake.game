<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Rush</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#menu{
text-align:center;
color:white;
}

h1{
font-size:42px;
margin-bottom:20px;
}

button{
padding:15px 35px;
font-size:22px;
border:none;
border-radius:12px;
background:#22c55e;
color:white;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

canvas{
display:none;
background:#111827;
border:4px solid #22c55e;
border-radius:12px;
}
</style>
</head>

<body>

<div id="menu">
<h1>🐍 Snake Rush</h1>
<button onclick="startGame()">Play</button>
</div>

<canvas id="game" width="400" height="400"></canvas>

<script>
function startGame(){
document.getElementById("menu").style.display="none";
document.getElementById("game").style.display="block";
alert("Game engine will be added in Step 2");
}
</script>

</body>
</html>
